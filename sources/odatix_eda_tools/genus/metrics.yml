  Cell_count:
    type: regex
    settings:
      file: report/utilization.rep
      pattern: "\\S+\\s+([0-9]+)\\s+([0-9.]+)\\s+([0-9.]+)\\s+([0-9.]+)\\s+([0-9.]+)\\s+([0-9.]+)\\s+([0-9.]+)\\s+([0-9.]+)\\s+([0-9.]+)\\s+([0-9.]+)\\s+([0-9.]+)\\s+([0-9.]+)"
      group_id: 1
    format: "%.0f"


  Slack_ps: 
    type: regex
    settings:
      file: report/timing.rep
      pattern: "Slack:=\\s+([-]?[0-9]*\\.?[0-9]+)" #marche
      group_id: 1
    format: "%.3f"
    unit: ps

  Slack:
    type: operation
    settings:
      op: Slack_ps / 1000
    format: "%.3f"
    unit: ns

  Internal_Power:
    type: regex
    settings:
      file: report/power.rep
      pattern: "Subtotal\\s+([0-9.eE+-]+)\\s+([0-9.eE+-]+)\\s+([0-9.eE+-]+)\\s+([0-9.eE+-]+)" #marche
      group_id: 2
    format: "%.8f"
    unit: mW

  Switching_Power:
    type: regex
    settings:
      file: report/power.rep
      pattern: "Subtotal\\s+([0-9.eE+-]+)\\s+([0-9.eE+-]+)\\s+([0-9.eE+-]+)\\s+([0-9.eE+-]+)" #marche
      group_id: 3
    format: "%.8f"
    unit: mW

  Leakage_Power:
    type: regex
    settings:
      file: report/power.rep
      pattern: "Subtotal\\s+([0-9.eE+-]+)\\s+([0-9.eE+-]+)\\s+([0-9.eE+-]+)\\s+([0-9.eE+-]+)" #marche
      group_id: 1
    format: "%.8e"
    unit: mW

  Total_Power:
    type: regex
    settings:
      file: report/power.rep
      pattern: "Subtotal\\s+([0-9.eE+-]+)\\s+([0-9.eE+-]+)\\s+([0-9.eE+-]+)\\s+([0-9.eE+-]+)" #marche
      group_id: 4
    format: "%.8f"
    unit: mW

  DMIPS_per_MHz:
    type: benchmark
    settings:
      key: DMIPS_per_MHz
    format: "%.3f"

  DMIPS:
    type: operation
    benchmark_only: True
    settings:
      op: DMIPS_per_MHz * Fmax
    format: "%.0f"

  Param_Domains:
    type: yaml
    error_if_missing: No
    settings:
      file: param_domains.yml