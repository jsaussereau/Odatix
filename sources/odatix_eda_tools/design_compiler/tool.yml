
##############################################
# Settings for Design Compiler
##############################################

process_group: True

# Default metrics file for this tool
default_metrics_file: $eda_tools_path/design_compiler/metrics.yml

unix:

  # Command to check if the tool is installed
  tool_test_command: 
    - make -f $eda_tools_path/design_compiler/makefile.mk test_tool

  # Command for fmax synthesis
  fmax_synthesis_command: 
    - make -f $eda_tools_path/design_compiler/makefile.mk synth_fmax
    - WORK_DIR=$work_path
    - SCRIPT_DIR=$script_path
    - LOG_DIR=$log_path

  # Command for RTL analysis
  analysis_command:
    - make -f $eda_tools_path/design_compiler/makefile.mk analyze
    - WORK_DIR=$work_path
    - SCRIPT_DIR=$script_path
    - LOG_DIR=$log_path

  # Command for custom frequency synthesis
  custom_freq_synthesis_command: 
    - make -f $eda_tools_path/design_compiler/makefile.mk synth
    - WORK_DIR=$work_path
    - SCRIPT_DIR=$script_path
    - LOG_DIR=$log_path



# Log formatting
format:

  # Format the whole log line
  logs:
    error:         ['<error>', 'Error:']
    warning:       ['<warning>', 'Warning:']
    info:          ['<note>', 'Information:']
    trace:         ['<trace>', 'Command:']

  # Format tags (replaced by the corresponding format escape code)
  tags:
    bold:          ['<bold>']
    end:           ['<end>']
    black:         ['<black>']
    red:           ['<red>']
    green:         ['<green>']
    yellow:        ['<yellow>']
    blue:          ['<blue>']
    magenta:       ['<magenta>']
    cyan:          ['<cyan>']
    grey:          ['<grey>']
    white:         ['<lgrey>']
    light_red:     ['<lred>']
    light_green:   ['<lgreen>']
    light_yellow:  ['<lyellow>']
    light_blue:    ['<lblue>']
    light_magenta: ['<lmagenta>']
    light_cyan:    ['<lcyan>']
    light_white:   ['<white>']
  
  # Replace sequences (regular expressions)
  replace:
    - "(Slack \\(VIOLATED\\))": "<red>$1<end>"
    - "(Slack \\(MET\\))": "<green>$1<end>"
    - "(.* completed successfully)": "<green>$1<end>"





